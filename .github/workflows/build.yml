name: Build and deploy feeds

on:
  workflow_dispatch:
  push:
    branches: [main]
  # Scheduled runs are triggered by a Cloudflare Worker cron that fires
  # workflow_dispatch every 15 minutes - GitHub's own schedule: trigger
  # slipped by 15-60 minutes during busy periods. See
  # docs/cron-cloudflare-trigger.md for the full setup.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Build feed JSON
        run: node scripts/build-feeds.js
        env:
          FEED_URL_NYT_US:      ${{ secrets.FEED_URL_NYT_US }}
          FEED_URL_AXIOS:       ${{ secrets.FEED_URL_AXIOS }}
          FEED_URL_POLITICO:    ${{ secrets.FEED_URL_POLITICO }}
          FEED_URL_TPM:         ${{ secrets.FEED_URL_TPM }}
          FEED_URL_NEWYORKER:   ${{ secrets.FEED_URL_NEWYORKER }}
          FEED_URL_TU_STATE:    ${{ secrets.FEED_URL_TU_STATE }}
          FEED_URL_TU_CLARK:    ${{ secrets.FEED_URL_TU_CLARK }}
          FEED_URL_CAPCON:      ${{ secrets.FEED_URL_CAPCON }}
          FEED_URL_CANDS:       ${{ secrets.FEED_URL_CANDS }}
          FEED_URL_NYSOP:       ${{ secrets.FEED_URL_NYSOP }}
          FEED_URL_HV1:         ${{ secrets.FEED_URL_HV1 }}
          FEED_URL_TU_HV:       ${{ secrets.FEED_URL_TU_HV }}
          FEED_URL_DF_KINGSTON: ${{ secrets.FEED_URL_DF_KINGSTON }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
