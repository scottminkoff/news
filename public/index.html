<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <h1>News</h1>
    <div class="header-right">
      <span id="updated" class="updated"></span>
      <button id="refresh" type="button">Refresh</button>
    </div>
  </header>
  <main>
    <section class="tier" data-tier="national">
      <h2>National</h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="state">
      <h2>New York State</h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="local">
      <h2>Hudson Valley</h2>
      <div class="feed"></div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
