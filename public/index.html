<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src * data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
  <title>Proximate News</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <img class="logo" src="./proximatenews.png" alt="Proximate News" />
    <div class="header-right">
      <span id="updated" class="updated"></span>
      <input type="search" id="search" placeholder="Search" aria-label="Search items">
      <select id="time-filter" aria-label="Filter by time">
        <option value="">Any time</option>
        <option value="3600">Past hour</option>
        <option value="21600">Past 6 hours</option>
        <option value="86400">Past 24 hours</option>
        <option value="604800">Past week</option>
      </select>
      <select id="source-filter" aria-label="Filter by source">
        <option value="">All sources</option>
      </select>
      <button id="refresh" type="button" aria-label="Refresh" title="Refresh">↻</button>
    </div>
  </header>
  <div class="keyword-chips" aria-label="Quick searches"></div>
  <nav class="tier-tabs" aria-label="Select section">
    <button type="button" data-tier-tab="national">National</button>
    <button type="button" data-tier-tab="state">New York State</button>
    <button type="button" data-tier-tab="local">Hudson Valley</button>
    <button type="button" data-tier-tab="opinion">Opinion</button>
    <button type="button" data-tier-tab="israel">Judaism &amp; Israel</button>
    <button type="button" data-tier-tab="foreign">Foreign Affairs</button>
  </nav>
  <main>
    <section class="tier" data-tier="national">
      <h2><img src="./national.png" alt="National" /></h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="state">
      <h2><img src="./state.png" alt="New York State" /></h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="local">
      <h2><img src="./hudsonvalley.png" alt="Hudson Valley" /></h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="opinion">
      <h2><img src="./opinion.png" alt="Opinion" /></h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="israel">
      <h2><img src="./judaismandisrael.png" alt="Judaism &amp; Israel" /></h2>
      <div class="feed"></div>
    </section>
    <section class="tier" data-tier="foreign">
      <h2><img src="./foreignaffairs.png" alt="Foreign Affairs" /></h2>
      <div class="feed"></div>
    </section>
  </main>
  <script src="./app.js"></script>
</body>
</html>
