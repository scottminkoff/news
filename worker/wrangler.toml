name = "news-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
ALLOWED_EMAILS = "sminkoff@gmail.com"
ALLOWED_ORIGIN = "https://scottminkoff.github.io"
SITE_URL = "https://scottminkoff.github.io/news/"
FROM_EMAIL = "onboarding@resend.dev"
# Set ALLOW_LOCALHOST = "1" for dev only (e.g. via `wrangler dev` overrides) to
# permit http://localhost:* origins. Do not set in production.

# KV namespace for sessions, magic tokens, bookmarks, and rate-limit counters.
# Create once in the Cloudflare dashboard (Workers & Pages → KV → Create
# namespace, name "news") and paste the resulting id below. The preview_id
# can match for development.
[[kv_namespaces]]
binding = "BOOKMARKS_KV"
id = "50fcbf91143e463d80ff8c5ef4e8d628"
preview_id = "50fcbf91143e463d80ff8c5ef4e8d628"

# Cron trigger: poke the GitHub Actions build workflow on schedule.
# Cloudflare Worker cron is reliable to the minute; GitHub's own
# schedule: trigger routinely slips by 15-60 minutes on free runners.
# Every 15 min: each build+Pages deploy can take several minutes, so a
# tighter cadence just stacks deploys in the single "pages" concurrency
# lane where they queue and cancel each other.
[triggers]
crons = ["*/15 * * * *"]
