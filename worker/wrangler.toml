name = "news-api"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
ALLOWED_EMAILS = "sminkoff@gmail.com"
ALLOWED_ORIGIN = "https://scottminkoff.github.io"
SITE_URL = "https://scottminkoff.github.io/news/"
FROM_EMAIL = "onboarding@resend.dev"

# KV namespace for sessions, magic tokens, bookmarks, and rate-limit counters.
# Create once in the Cloudflare dashboard (Workers & Pages → KV → Create
# namespace, name "news") and paste the resulting id below. The preview_id
# can match for development.
[[kv_namespaces]]
binding = "BOOKMARKS_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_NAMESPACE_ID"
